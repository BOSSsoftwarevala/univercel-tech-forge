name: Manual Deploy to VPS

# ================================================
# AUTO DEPLOY COMPLETELY DISABLED
# Deploy ONLY via manual workflow_dispatch
# NO auto deploy on push, save, or any trigger
# ================================================

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Type "DEPLOY" to confirm manual deployment'
        required: true
        type: string
      maintenance_window:
        description: 'Confirm this is during maintenance window'
        required: true
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Validate deployment confirmation
      run: |
        if [ "${{ github.event.inputs.confirm_deploy }}" != "DEPLOY" ]; then
          echo "❌ Deployment cancelled - confirmation text must be 'DEPLOY'"
          exit 1
        fi
        if [ "${{ github.event.inputs.maintenance_window }}" != "true" ]; then
          echo "❌ Deployment cancelled - must confirm maintenance window"
          exit 1
        fi
        echo "✅ Deployment confirmed by Super Admin"

  build:
    needs: validate
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build application
      run: npm run build
    
    - name: Run security audit
      run: npm audit --production || true
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/
    
    - name: Deploy to VPS via SSH (Manual Only)
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          # ================================================
          # MANUAL DEPLOY ONLY - Super Admin Controlled
          # ================================================
          
          echo "🚀 Starting manual deployment..."
          echo "Deployed by: ${{ github.actor }}"
          echo "Deploy time: $(date)"
          
          # Navigate to project folder
          cd /var/www/PROJECT_FOLDER
          
          # Pull latest code
          git fetch origin main
          git reset --hard origin/main
          
          # Install dependencies
          npm ci --production
          
          # Build application
          npm run build
          
          # Restart services
          pm2 restart all
          
          # Log deployment
          echo "✅ Manual deployment completed at $(date) by ${{ github.actor }}" >> /var/log/deploy.log
          echo "✅ Deployment successful"

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run dependency vulnerability scan
      run: |
        npm audit --audit-level=high || echo "Vulnerabilities found - review required"
    
    - name: Check for secrets in code
      run: |
        # Simple check for hardcoded secrets
        if grep -rE "(password|api_key|secret).*=.*['\"]" src/ --include="*.ts" --include="*.tsx" | grep -v ".env" | grep -v "example"; then
          echo "Warning: Potential hardcoded secrets found"
        fi
